---
name: Bug Report
about: Create a report to help us improve
title: '[BUG] '
labels: ['bug']
assignees: ''
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: Operating system
      placeholder: macOS 14.5, Ubuntu 22.04
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 20.x
  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: 1.80
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 126, Safari 17
  - type: input
    id: branch
    attributes:
      label: Branch/Commit
      placeholder: main, commit hash
  - type: textarea
    id: logs
    attributes:
      label: Screenshots/Logs
      description: If applicable, add screenshots or log output
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here