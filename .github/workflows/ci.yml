name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  RUST_VERSION: 'stable'

jobs:
  # TypeScript/React CI
  typescript:
    name: TypeScript CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build trace-core (Rust)
        working-directory: trace-core
        run: cargo build --release

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: trace-core/package-lock.json

      - name: Build N-API binary (napi-rs)
        working-directory: trace-core
        run: |
          npm ci
          npx napi build --platform --release

      - name: Setup Node.js (root)
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Node.js (ts-wrapper)
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: trace-core/ts-wrapper/package-lock.json

      - name: Build trace-core TypeScript wrapper
        working-directory: trace-core/ts-wrapper
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Copy native module to ts-wrapper dist
        working-directory: trace-core
        run: |
          ls -la trace_core.*.node
          cp trace_core.*.node ts-wrapper/dist/ 2>/dev/null && echo "Copied native module" || \
          (echo "No native module found to copy" && exit 1)
          ls -la ts-wrapper/dist/trace_core.*.node

      - name: TypeScript type check
        run: npm run trace:typecheck

      - name: Run linting (if available)
        run: |
          if npm run lint 2>/dev/null; then
            npm run lint
          else
            echo "No lint script defined, skipping"
          fi

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  # Rust CI for trace-core
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trace-core
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: trace-core/target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --lib -- -D warnings

      - name: Build library
        run: cargo build --lib --release

      - name: Run tests
        run: cargo test --lib

  # Python ML CI
  python-ml:
    name: Python ML CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stria-ingestion-pipeline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run syntax check
        run: python -m py_compile $(find . -name "*.py")

      - name: Run tests (if any)
        run: |
          if [ -f pytest.ini ] || [ -f pyproject.toml ] || ls tests/*.py 2>/dev/null; then
            pytest
          else
            echo "No tests found, skipping"
          fi

  # Cloudflare Pages Preview Deploy (on PRs)
  preview-deploy:
    name: Preview Deploy (PR)
    needs: [typescript, rust, python-ml]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build trace-core (Rust)
        working-directory: trace-core
        run: cargo build --release

      - name: Build N-API binary (napi-rs)
        working-directory: trace-core
        run: |
          npm ci
          npx napi build --platform --release

      - name: Build trace-core TypeScript wrapper
        working-directory: trace-core/ts-wrapper
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (Preview)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: stria-systems
          directory: dist
          branch: preview-${{ github.event.pull_request.number }}
          wranglerVersion: '4'

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://preview-${{ github.event.pull_request.number }}.stria-systems.pages.dev`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Preview Deployment Ready**\n\nYour changes are live at: ${url}\n\nThis preview will update automatically on each push to this PR.`
            })

