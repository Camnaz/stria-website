name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: read

jobs:
  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    if: github.actor == 'dependabot[bot]' || github.actor == 'dependabot'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2.2.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch/minor updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add auto-merge label for major updates (manual review)
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr edit "${{ github.event.pull_request.html_url }}" --add-label "dependabot-major"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add security label for security updates
        if: steps.metadata.outputs.update-type == 'version-update:security'
        run: |
          gh pr edit "${{ github.event.pull_request.html_url }}" --add-label "security"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}