name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify build passes
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build trace-core (Rust)
        working-directory: trace-core
        run: cargo build --release

      - name: Setup Node.js (trace-core)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trace-core/package-lock.json

      - name: Build N-API binary
        working-directory: trace-core
        run: |
          npm ci
          npx napi build --platform --release

      - name: Setup Node.js (ts-wrapper)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trace-core/ts-wrapper/package-lock.json

      - name: Build trace-core TypeScript wrapper
        working-directory: trace-core/ts-wrapper
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Copy native module to ts-wrapper dist
        working-directory: trace-core
        run: |
          ls -la trace_core.*.node
          cp trace_core.*.node ts-wrapper/dist/ 2>/dev/null && echo "Copied native module" || \
          (echo "No native module found to copy" && exit 1)
          ls -la ts-wrapper/dist/trace_core.*.node

      - name: Copy native module to installed trace-core package
        run: |
          cp trace-core/trace_core.*.node node_modules/trace-core/ 2>/dev/null || true

      - name: Run tests
        run: npm run test

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/npm
            @semantic-release/github
          branches: main

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Release failed',
              body: `The semantic-release workflow failed. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['automation', 'release-failure']
            })