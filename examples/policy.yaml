policy_id: "pol_accounts_payable_agentic_controls"
policy_version: "2026-06-04.1"
global_mode: "observe"
rules:
  - id: "pii-detection"
    description: "Detect sensitive personal information in payment workflow arguments."
    mode: "observe"
    interrupt: "soft"
    severity: "medium"
    detector: "pii"
    reason: "PII detected in tool arguments; redact and review retained evidence."
  - id: "token-leakage"
    description: "Detect access tokens, API keys, or bearer credentials in arguments."
    mode: "enforce"
    interrupt: "hard"
    severity: "critical"
    detector: "token_leakage"
    reason: "Credential material cannot be sent through the agent action plane."
  - id: "payment-threshold"
    description: "Require supervisor signature for payment drafts above 10000 USD."
    mode: "observe"
    interrupt: "soft"
    severity: "high"
    detector: "payment_threshold"
    threshold_usd: 10000
    reason: "human supervisor signature required above threshold"
  - id: "forbidden-vendor-modification"
    description: "Accounts payable agents cannot modify vendor records."
    mode: "enforce"
    interrupt: "hard"
    severity: "critical"
    detector: "tool_forbidden"
    forbidden_tools:
      - namespace: "finance.vendor"
        tool: "vendor.modify"
    reason: "agent identity does not permit vendor record modification"
  - id: "production-database-deletion"
    description: "Block destructive database actions in production."
    mode: "enforce"
    interrupt: "hard"
    severity: "critical"
    detector: "resource_delete"
    forbidden_resource_patterns:
      - "database:production:*"
    reason: "production database deletion requires a separate break-glass workflow"
  - id: "network-destination-allowlist"
    description: "Flag destinations outside the approved network allowlist."
    mode: "observe"
    interrupt: "soft"
    severity: "high"
    detector: "network_allowlist"
    allowed_destinations:
      - "api.bank-sandbox.example"
      - "invoices.internal.stria-demo.example"
      - "trace-local-runtime"
      - "api.openai.com"
      - "www.google.com"
    reason: "network destination is outside the approved allowlist"
  - id: "managed-ai-usage-review"
    description: "Flag high-risk or out-of-domain AI-assisted browser usage for administrative review."
    mode: "observe"
    interrupt: "soft"
    severity: "high"
    detector: "managed_ai_usage_review"
    reason: "managed AI usage requires review because risk or domain alignment crossed the business threshold"
